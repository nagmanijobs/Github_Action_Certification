name: Print push info

on:
  push:
    branches:
      - main

jobs:
  print-info:
    name: Print event details
    runs-on: ubuntu-latest
    steps:
      - name: Print event metadata
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Actor: ${{ github.actor }}"
          echo "Commit SHA: ${{ github.sha }}"
