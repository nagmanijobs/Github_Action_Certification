          echo "Beta deployment completed"

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [deploy-qa, deploy-beta]
    environment: Prod
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set node version
        id: node-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.node-version }}" >> $GITHUB_OUTPUT
          else
            echo "version=20" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve successful CI run for this commit
        id: ci-run
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/resolve-ci-run.js');
            await script({github, context, core});

