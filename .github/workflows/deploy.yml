name: Deploy Pipeline

on:
  workflow_dispatch:
    inputs:
      node-version:
        description: 'Node version of artifact to deploy (18 or 20)'
        required: true
        default: '20'
        type: choice
        options:
          - '18'
          - '20'
  workflow_run:
    workflows: ["CI - run tests"]
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: Dev
    # Only run on workflow_dispatch or if the triggering CI test workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set node version
        id: node-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.node-version }}" >> $GITHUB_OUTPUT
          else
            echo "version=20" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve successful CI run for this commit
        id: ci-run
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/resolve-ci-run.js');
            await script({github, context, core});

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.ci-run.outputs.run_id }}
          name-pattern: build-artifacts-node-${{ steps.node-version.outputs.version }}-${{ steps.short-sha.outputs.sha }}-*
          path: ./build-artifacts
          merge-multiple: false

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la ./build-artifacts/

      - name: Deploy Dev
        run: |
          echo "Starting Dev deployment..."
          echo "Service: ${{ github.repository }}"
          echo "Deploying commit: ${{ github.sha }}"
          echo "Node version: ${{ steps.node-version.outputs.version }}"
          echo "Artifacts location: ./build-artifacts/"
          echo "Dev deployment completed"

  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: QA
    # Only run on workflow_dispatch or if the triggering CI test workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set node version
        id: node-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.node-version }}" >> $GITHUB_OUTPUT
          else
            echo "version=20" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve successful CI run for this commit
        id: ci-run
        uses: actions/github-script@v7
        with:
          script: |
            const script = require('./.github/scripts/resolve-ci-run.js');
            await script({github, context, core});

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.ci-run.outputs.run_id }}
          name-pattern: build-artifacts-node-${{ steps.node-version.outputs.version }}-${{ steps.short-sha.outputs.sha }}-*
          path: ./build-artifacts
