      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          ls -la ./build-artifacts/

      - name: Deploy QA
        run: |
          echo "Starting QA deployment..."
          echo "Service: ${{ github.repository }}"
          echo "Deploying commit: ${{ github.sha }}"
          echo "Node version: ${{ steps.node-version.outputs.version }}"
          echo "Artifacts location: ./build-artifacts/"
          echo "QA deployment completed"

  deploy-beta:
    name: Deploy to Beta
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: Beta
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set node version
        id: node-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.node-version }}" >> $GITHUB_OUTPUT
          else
            echo "version=20" >> $GITHUB_OUTPUT
          fi

      - name: Get short SHA
        id: short-sha
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Resolve successful CI run for this commit
